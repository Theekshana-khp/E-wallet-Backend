spring.application.name=api-gateway
server.port=8081

Eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

logging.level.root=INFO
logging.level.org.springframework.cloud.gateway.route.RouteDefinitionRouteLocator=INFO
logging.level.org.springframework.cloud.gateway = TRACE

spring.cloud.gateway.routes[0].id=transaction-service
spring.cloud.gateway.routes[0].uri=lb://transaction-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/transactions

spring.cloud.gateway.routes[1].id=dashboard-service
spring.cloud.gateway.routes[1].uri=lb://dashboard-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/dashboard

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8181/realms/e-wallet-microservices
